<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday - فاطمه</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --dark-red-bg: #1a0000; --mid-red-bg: #660000; --top-bg: #050000;
            --card-red: rgba(100, 0, 0, 0.3); --neon-red: #ff0000; --gold: #ffd700;
        }
        body { background: linear-gradient(0deg, var(--dark-red-bg) 0%, var(--mid-red-bg) 40%, var(--top-bg) 100%); margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Cairo', sans-serif; overflow: hidden; perspective: 2000px; touch-action: manipulation; }
        .aurora-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, #300000, #800000, #1a0000, #000); background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: -1; }
        #heart-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 2; }
        .lights { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-around; z-index: 10; padding: 10px 0; }
        .light { width: 14px; height: 14px; border-radius: 50%; animation: blink 0.8s infinite alternate ease-in-out; }
        @keyframes blink { 0% { opacity: 0.3; transform: scale(0.8); box-shadow: 0 0 10px currentColor; } 100% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 20px currentColor; } }
        .container { position: relative; width: 92%; max-width: 420px; height: 650px; z-index: 5; }
        .card { position: absolute; width: 100%; height: 100%; background: var(--card-red); backdrop-filter: blur(25px); border-radius: 50px; padding: 30px 20px; text-align: center; box-shadow: 0 25px 80px rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; transform: translateZ(-800px) rotateX(10deg); transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); box-sizing: border-box; border: 2px solid rgba(255, 0, 0, 0.3); visibility: hidden; color: white; overflow: hidden; }
        .active-card { opacity: 1 !important; pointer-events: auto !important; transform: translateZ(0) rotateX(0deg) !important; visibility: visible;}
        .exit-card { opacity: 0 !important; transform: translateZ(500px) translateY(-50px) !important; }
        .video-wrapper { width: 100%; height: 220px; border-radius: 25px; overflow: hidden; border: 3px solid var(--neon-red); box-shadow: 0 0 25px var(--neon-red); margin-bottom: 15px; background: #000; position: relative; }
        .image-content, .video-content { width: 100%; height: 100%; object-fit: contain; background-color: #000; }
        .pro-emoji { font-size: 3.5rem; filter: drop-shadow(0 0 10px var(--neon-red)); margin-bottom: 5px; animation: floatEmoji 4s infinite ease-in-out; }
        @keyframes floatEmoji { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .sender-name { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.8); margin-bottom: 10px; }
        .neon-name { font-family: 'Amiri', serif; font-size: 4rem; color: #fff; text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; animation: neonPulse 1s infinite alternate; margin: 15px 0; }
        input { width: 100%; height: 55px; border-radius: 25px; border: none; margin: 15px 0; text-align: center; font-size: 1.1rem; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .unlock-btn { width: 100%; min-height: 60px; border-radius: 25px; border: none; background: linear-gradient(45deg, #8b0000, #ff0000); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,0,0,0.4); }
        .message-box { font-size: 1.05rem; line-height: 1.7; color: #eee; overflow-y: auto; max-height: 220px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 25px; text-align: right; width: 100%; }
        #adminPanel { position:fixed;top:0;left:0;width:100%;height:100%;background:#111;z-index:10000;padding:20px;overflow-y:auto;color:#fff;text-align:right;font-family:'Cairo'; }
        #adminPanel input, #adminPanel textarea, #adminPanel select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border-radius: 8px; border: 1px solid #444; background: #fff; color: #000; }
        .tap-heart { position: fixed; pointer-events: none; animation: tapFly 1s forwards; z-index: 9999; }
        @keyframes tapFly { to { transform: translateY(-100px) scale(2); opacity: 0; } }
    </style>
</head>
<body onclick="createTapHeart(event)">

    <div class="aurora-bg"></div>
    <audio id="xmasSound" preload="auto"></audio>
    <canvas id="heart-canvas"></canvas>
    <div class="lights" id="top-lights"></div>

    <div class="container" id="mainContainer">
        <div id="step1" class="card active-card">
            <div id="ui-year" style="background:#8b0000; padding: 5px 25px; border-radius:20px; font-weight:bold; margin-bottom:10px; border: 1px solid var(--gold);">✨ 2026 ✨</div>
            <span id="ui-emoji" class="pro-emoji">🎁</span>
            <h1 id="ui-title" style="font-family: 'Amiri', serif; font-size: 2.2rem; margin: 10px 0;">Happy Birthday</h1>
            <div id="ui-sender" class="sender-name">فاطمه</div>
            <p id="ui-welcome">انهارده عيد ميلادك يعسل🙈</p>
            <input type="text" id="passCode" placeholder="اكتبي الباسورد هنا يا بطوط">
            <button id="ui-btn1" class="unlock-btn" onclick="checkPassword()">دوسي هنا بقا متوجعيش دماغنا😂♥️</button>
        </div>

        <div id="step2" class="card">
            <div class="video-wrapper" id="media-container"></div>
            <div id="ui-message" class="message-box"></div>
            <button id="ui-btn2" class="unlock-btn" onclick="goToStep3()" style="margin-top: 15px; min-height: 50px;">اضغطي هنا يا قلبي ❤️</button>
        </div>

        <div id="step3" class="card">
            <div style="margin-top: 20px;"><span class="pro-emoji" style="font-size: 4rem;">👑</span></div>
            <div class="neon-name" id="ui-neon">فطومتي</div>
            <h2 id="ui-final-h2" style="color: #ffd700; font-family: 'Amiri'; font-size: 1.8rem;">أحلى فاطمه في الدنيا كلها 😍</h2>
            <p id="ui-final-p" style="font-size: 1.2rem; padding: 0 10px;">تفضلي دايماً منورة حياتي يا أجمل ملكة في قلبي ♥️✨</p>
            <div style="margin-top: auto; width: 100%;">
                <button class="unlock-btn" onclick="location.reload()">إعادة العرض من الأول ❤️</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQhPApGNZsaCDPP7LibF9mJdZjXKJGD_g",
            authDomain: "fatma-bday-site.firebaseapp.com",
            databaseURL: "https://fatma-bday-site-default-rtdb.firebaseio.com/",
            projectId: "fatma-bday-site",
            storageBucket: "fatma-bday-site.firebasestorage.app",
            messagingSenderId: "412844539374",
            appId: "1:412844539374:web:715e8096fc76dd8046a2ff"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('siteData');

        let currentPass = "2/5";

        // مزامنة البيانات من Firebase
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('ui-year').innerText = data.year || "✨ 2026 ✨";
                document.getElementById('ui-emoji').innerText = data.emoji || "🎁";
                document.getElementById('ui-title').innerText = data.title || "Happy Birthday";
                document.getElementById('ui-sender').innerText = data.sender || "فاطمه";
                document.getElementById('ui-welcome').innerText = data.welcome || "انهارده عيد ميلادك يعسل🙈";
                document.getElementById('passCode').placeholder = data.passPlaceholder || "اكتبي الباسورد هنا يا بطوط";
                document.getElementById('ui-btn1').innerText = data.btn1Text || "دوسي هنا بقا متوجعيش دماغنا😂♥️";
                currentPass = data.password || "2/5";

                const mediaCont = document.getElementById('media-container');
                if(data.mediaType === "video") {
                    mediaCont.innerHTML = `<video class="video-content" autoplay loop playsinline><source src="${data.mediaUrl}" type="video/mp4"></video>`;
                } else {
                    mediaCont.innerHTML = `<img src="${data.mediaUrl || 'https://files.catbox.moe/73jyi4.jpg'}" class="image-content">`;
                }
                
                document.getElementById('xmasSound').src = data.musicUrl || "https://www.soundjay.com/holiday/sleigh-bells-7.mp3";
                document.getElementById('ui-message').innerHTML = data.message || "<p>كل سنه واحنا مع بعض ي بنوتي ♥</p>";
                document.getElementById('ui-btn2').innerText = data.btn2Text || "اضغطي هنا يا قلبي ❤️";
                document.getElementById('ui-neon').innerText = data.neonName || "فطومتي";
            }
        });

        // لوحة التحكم المدمجة
        if(window.location.search.includes('edit')) {
            let p = prompt("باسورد الإدارة:");
            if(p === "123") {
                const adminHTML = `
                <div id="adminPanel" dir="rtl">
                    <h3 style="color:red">🛠️ لوحة تحكم مصطفى (إدارة شاملة)</h3>
                    <label>الباسورد اللي فاطمة هتدخل بيه (ميزة التغيير):</label><input id="in-pass" type="text">
                    <label>السنة (2026):</label><input id="in-year" type="text">
                    <label>الإيموجي (🎁):</label><input id="in-emoji" type="text">
                    <label>العنوان (Happy Birthday):</label><input id="in-title" type="text">
                    <label>الاسم (فاطمه):</label><input id="in-sender" type="text">
                    <label>رسالة الترحيب:</label><input id="in-welcome" type="text">
                    <label>تلميح خانة الباسورد:</label><input id="in-passP" type="text">
                    <label>نص زرار الدخول:</label><input id="in-btn1" type="text">
                    <hr>
                    <label>نوع الميديا (صورة أو فيديو):</label>
                    <select id="in-mediaType"><option value="image">صورة</option><option value="video">فيديو</option></select>
                    <label>رابط الميديا (Catbox أو غيره):</label><input id="in-mediaUrl" type="text">
                    <label>رابط الموسيقى (mp3):</label><input id="in-music" type="text">
                    <label>الرسالة الطويلة (استخدم p للفقرات):</label><textarea id="in-msg" rows="8"></textarea>
                    <label>نص زرار الانتقال:</label><input id="in-btn2" type="text">
                    <label>الاسم المنور في النهاية:</label><input id="in-neon" type="text">
                    <button onclick="saveData()" style="width:100%;padding:20px;background:green;color:#fff;border:none;border-radius:15px;font-weight:bold;cursor:pointer">حفظ ونشر التعديلات فوراً ✅</button>
                    <button onclick="window.location.href=window.location.pathname" style="width:100%;margin-top:10px;padding:10px;background:#444;color:#fff;border:none;border-radius:10px">إغلاق اللوحة</button>
                </div>`;
                document.body.insertAdjacentHTML('beforeend', adminHTML);
                db.once('value').then(s => {
                    const d = s.val();
                    if(d) {
                        document.getElementById('in-pass').value = d.password || "2/5";
                        document.getElementById('in-year').value = d.year || "";
                        document.getElementById('in-emoji').value = d.emoji || "";
                        document.getElementById('in-title').value = d.title || "";
                        document.getElementById('in-sender').value = d.sender || "";
                        document.getElementById('in-welcome').value = d.welcome || "";
                        document.getElementById('in-passP').value = d.passPlaceholder || "";
                        document.getElementById('in-btn1').value = d.btn1Text || "";
                        document.getElementById('in-mediaType').value = d.mediaType || "image";
                        document.getElementById('in-mediaUrl').value = d.mediaUrl || "";
                        document.getElementById('in-music').value = d.musicUrl || "";
                        document.getElementById('in-msg').value = d.message || "";
                        document.getElementById('in-btn2').value = d.btn2Text || "";
                        document.getElementById('in-neon').value = d.neonName || "";
                    }
                });
            }
        }

        function saveData() {
            db.set({
                password: document.getElementById('in-pass').value,
                year: document.getElementById('in-year').value,
                emoji: document.getElementById('in-emoji').value,
                title: document.getElementById('in-title').value,
                sender: document.getElementById('in-sender').value,
                welcome: document.getElementById('in-welcome').value,
                passPlaceholder: document.getElementById('in-passP').value,
                btn1Text: document.getElementById('in-btn1').value,
                mediaType: document.getElementById('in-mediaType').value,
                mediaUrl: document.getElementById('in-mediaUrl').value,
                musicUrl: document.getElementById('in-music').value,
                message: document.getElementById('in-msg').value,
                btn2Text: document.getElementById('in-btn2').value,
                neonName: document.getElementById('in-neon').value
            }).then(() => alert("عاش يا مصطفى! كل حاجة اتحدثت في اللينك"));
        }

        function checkPassword() {
            if(document.getElementById('passCode').value === currentPass) {
                document.getElementById('step1').classList.add('exit-card');
                document.getElementById('xmasSound').play();
                setTimeout(() => {
                    document.getElementById('step1').classList.remove('active-card');
                    document.getElementById('step2').classList.add('active-card');
                    startCelebration();
                }, 1000);
            } else { alert("الباسورد غلط! ركز يا وحش 😂"); }
        }

        function goToStep3() {
            document.getElementById('step2').classList.add('exit-card');
            setTimeout(() => {
                document.getElementById('step2').classList.remove('active-card');
                document.getElementById('step3').classList.add('active-card');
                startCelebration();
            }, 1000);
        }

        // المؤثرات البصرية
        function createTapHeart(e) {
            const h = document.createElement('div');
            h.innerHTML = '❤️'; h.className = 'tap-heart';
            h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }

        const lc = document.getElementById('top-lights');
        for(let i=0; i<20; i++) {
            const l = document.createElement('div');
            l.className = 'light';
            l.style.backgroundColor = ['#ff0000', '#ffffff', '#ffd700'][i % 3];
            l.style.animationDelay = (i * 0.1) + 's';
            lc.appendChild(l);
        }

        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, hearts = [];
        function initHearts() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            hearts = Array.from({length: 40}, () => ({
                x: Math.random() * width, y: Math.random() * height,
                size: Math.random() * 15 + 10, speed: Math.random() * 0.8 + 0.3,
                opacity: Math.random() * 0.5 + 0.2, type: Math.random() > 0.5 ? '❤️' : '🌹'
            }));
        }
        function drawHearts() {
            ctx.clearRect(0, 0, width, height);
            hearts.forEach(h => {
                ctx.globalAlpha = h.opacity; ctx.font = `${h.size}px Arial`;
                ctx.fillText(h.type, h.x, h.y); h.y += h.speed;
                if(h.y > height) h.y = -20;
            });
            requestAnimationFrame(drawHearts);
        }
        function startCelebration() {
            const emojis = ['🎂','✨','🎈','❤️','🥳','🎉','🌹'];
            for(let i=0; i<60; i++) {
                setTimeout(() => {
                    const h = document.createElement('div');
                    h.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
                    h.style.cssText = `left:${Math.random()*100}%; position:fixed; top:-50px; font-size:30px; z-index:999; animation:fall 3s linear forwards;`;
                    document.body.appendChild(h);
                }, i * 150);
            }
        }
        const style = document.createElement('style');
        style.innerHTML = `@keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }`;
        document.head.appendChild(style);
        window.addEventListener('resize', initHearts);
        initHearts(); drawHearts();
    </script>
<script>
  window.HEARTLINK_GIFT_ID = "gift-heartlink-j";
</script>
<script src="https://cdn.jsdelivr.net/gh/HeartLink349/Heart_Link@heartlink-lock-system/heartlink-lock.js"></script>
</body>
</html>
